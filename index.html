<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人生活與心理傾向調查</title>
    <style>
        body { background-color: #f4f4f4; color: #333; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background 0.8s; }
        .quiz-container { width: 95%; max-width: 700px; padding: 40px; border: 1px solid #ddd; background-color: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: all 1s ease; }
        .psychopath-mode { background-color: #000; color: #ff0000; border: 2px solid #500; }
        h2 { font-size: 1.8rem; line-height: 1.6; margin-bottom: 30px; }
        .option-label { display: block; padding: 15px; margin: 15px 0; border: 1px solid #ccc; cursor: pointer; font-size: 1.2rem; border-radius: 8px; transition: 0.3s; }
        .psychopath-mode .option-label:hover { background-color: #300; border-color: #700; }
        button { width: 100%; padding: 15px; background-color: #333; color: #fff; border: none; cursor: pointer; font-size: 1.2rem; border-radius: 8px; }
        .psychopath-mode button { background-color: #700; color: white; }
    </style>
</head>
<body>

<div class="quiz-container" id="app">
    <h2 id="question">正在初始化分析程序...</h2>
    <div id="options"></div>
    <button id="btn" onclick="checkAnswer()">確認選擇</button>
</div>

<!-- 預載入一段恐怖笑聲 -->
<audio id="scream" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
    const quizData = [
        {q: "1. 週末時，你通常比較偏好哪種休息方式？", o: ["安靜在家追劇", "出門找朋友聚餐", "隨機找個陌生的地方散心"]},
        {q: "2. 如果朋友突然沒回訊息，你會怎麼想？", o: ["他在忙吧，晚點再傳", "是不是我說錯話了？", "他在跟誰聊天才沒空理我？"]},
        {q: "3. 你對「一見鍾情」的看法是？", o: ["浪漫但罕見", "很難發生在現實", "那是靈魂深處的強制連結"]},
        {q: "4. 你覺得愛情中，最重要的守則是什麼？", o: ["誠實相待", "給予對方空間", "完全的佔有與信任"]},
        {q: "5. 如果發現喜歡的人隱瞞了行蹤，你會？", o: ["給他隱私，不追問", "委婉詢問", "默默記下時間，自己調查"]},
        {q: "6. 如果可以選擇，你希望被你愛的人如何對待？", o: ["溫柔地愛護", "作為唯一的重心", "被囚禁在他的視野裡"]},
        {q: "7. 盯著對方的社群帳號，一直重整看他上線了嗎，這行為你覺得？", o: ["太不健康了", "這就是愛情的代價", "這是在確保他的安全"]},
        {q: "8. 為了對方的安全，稍微限制他的交友圈，是合理的嗎？", o: ["不合理，太恐怖了", "或許吧，為了保護他", "絕對合理，那是我的權利"]},
        {q: "9. 你開始感覺到，這不是一般的心理問卷了吧？", o: ["有一點奇怪...", "我感覺到了惡意", "我非常興奮..."]},
        {q: "10. 其實我一直看著妳，蘇芝瑩。妳能感覺到嗎？", o: ["...你在說什麼？", "我感覺到了。", "請繼續看著我。"]}
    ];

    let i = 0;
    function render() {
        if(i >= 6) document.getElementById("app").className = "quiz-container psychopath-mode";
        document.getElementById("question").innerText = quizData[i].q;
        let html = "";
        quizData[i].o.forEach(o => html += `<label class="option-label"><input type="radio" name="ans" value="${o}"> ${o}</label>`);
        document.getElementById("options").innerHTML = html;
    }
    
    function checkAnswer() {
        if(!document.querySelector('input[name="ans"]:checked')) return alert("不可以猶豫。");
        i++;
        if(i < quizData.length) render();
        else {
            // 最後一題後的驚悚效果
            document.getElementById("app").innerHTML = "<h2>蘇芝瑩，遊戲結束了。<br>我們永遠在一起。</h2>";
            document.body.style.backgroundColor = "red";
            document.getElementById('scream').play();
            setTimeout(() => {
                alert("找到妳了。");
                window.location.reload(); // 循環惡夢
            }, 1000);
        }
    }
    render();
</script>
</body>
</html>
