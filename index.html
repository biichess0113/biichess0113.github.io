<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>...</title>
    <style>
        body { background: #000; color: #500; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; cursor: crosshair; transition: 1s; overflow: hidden; }
        .container { width: 90%; max-width: 600px; padding: 40px; border: 1px solid #300; background: #050505; text-align: center; }
        .option { padding: 15px; border: 1px solid #300; margin: 15px 0; color: #700; cursor: pointer; transition: 0.3s; }
        .option:hover { background: #200; border-color: #f00; color: #f00; }
        #q { color: #fff; font-size: 1.3rem; margin-bottom: 20px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

<!-- 點擊觸發層 -->
<div id="overlay" onclick="start()">
    <h1>偵測到連結... 點擊螢幕以開始監控</h1>
</div>

<div class="container" id="app">
    <h2 id="q">螢幕前...似乎有人在看著妳。</h2>
    <div id="opts"></div>
</div>

<audio id="audio" loop>
    <source src="https://actions.google.com/sounds/v1/horror/heartbeat_with_deep_breath.ogg" type="audio/ogg">
</audio>

<script>
    let i = 0;
    const data = [
        {q:"1. 妳現在在哪裡？", o:["家裡", "學校", "我不告訴你"]},
        {q:"2. 妳剛剛是不是往窗外看了？", o:["沒有", "你怎麼知道", "你在監視我嗎"]},
        {q:"3. 妳覺得，一個人被注視著，是什麼感覺？", o:["很噁心", "有點在意", "很安心"]},
        {q:"4. 如果那個人是為了保護妳，妳能接受嗎？", o:["不能", "不知道", "可以"]},
        {q:"5. 蘇芝瑩，妳相信命運嗎？", o:["不信", "稍微信", "我相信我們是命中註定的"]},
        {q:"6. 我知道妳現在的心跳很快，是因為我嗎？", o:["...自戀", "不知道", "嗯..."]},
        {q:"7. 我已經在看著妳了，妳感覺到了嗎？", o:["沒有", "有一點", "感覺到了"]},
        {q:"8. 妳的秘密，我其實都處理得很好，對吧？", o:["你什麼意思", "你在說什麼", "謝謝你幫我"]},
        {q:"9. 只要妳乖乖的，我就不會讓任何人傷害妳。", o:["我不需要你管", "你是誰", "好，聽你的"]},
        {q:"10. 最後，妳願意把一切都交給我嗎？", o:["不要", "我再想想", "我願意 ❤️"]}
    ];

    function start() {
        document.getElementById('audio').play();
        document.getElementById('overlay').style.display = 'none';
        render();
    }

    function render() {
        document.getElementById("q").innerText = data[i].q;
        let html = "";
        data[i].o.forEach(o => html += `<div class="option" onclick="next('${o}')">${o}</div>`);
        document.getElementById("opts").innerHTML = html;
    }

    function next(ans) {
        i++;
        if(i < data.length) render();
        else end();
    }

    function end() {
        let app = document.getElementById("app");
        let txt = ["分析完成...", "目標：蘇芝瑩", "狀態：已連結", "妳逃不掉了...", "永遠，在一起。❤️"];
        app.innerHTML = "<h2 id='final'></h2>";
        let f = document.getElementById("final");
        let idx = 0;
        function type() {
            if(idx < txt.length) {
                f.innerText = txt[idx];
                idx++;
                setTimeout(type, 1800);
            } else {
                f.innerHTML += "<br><br><span style='color:red; cursor:pointer' onclick='location.reload()'>重新開始我們的連結</span>";
            }
        }
        type();
    }
</script>
</body>
</html>
