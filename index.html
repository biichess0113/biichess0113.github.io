<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潛意識連結分析</title>
    <style>
        body { background-color: #0d0d0d; color: #888; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background 2s; }
        .container { width: 90%; max-width: 600px; padding: 40px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #progress { width: 100%; height: 4px; background: #333; margin-bottom: 30px; }
        #bar { height: 100%; background: #555; width: 0%; transition: 0.8s; }
        h2 { font-size: 1.4rem; margin-bottom: 30px; color: #ccc; }
        .option { display: block; padding: 18px; margin: 12px 0; border: 1px solid #444; cursor: pointer; color: #eee; transition: 0.3s; }
        .option:hover { background: #2a2a2a; border-color: #666; }
        .yandere { border-color: #500; color: #f00; }
        #restart { margin-top: 20px; color: #555; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="progress"><div id="bar"></div></div>
    <h2 id="q">正在同步靈魂深處的連結...</h2>
    <div id="opts"></div>
</div>

<script>
    const data = [
        {q:"1. 您通常在晚上幾點就寢？", o:["10點前", "12點前", "熬夜到很晚"]},
        {q:"2. 下課時你喜歡做什麼？", o:["聊天", "去操場", "留在位子上觀察周圍"]},
        {q:"3. 週末喜歡在哪？", o:["在家", "圖書館", "外面逛街"]},
        {q:"4. 朋友間最重要的特質？", o:["誠實", "幽默", "陪伴"]},
        {q:"5. 有特別喜歡的顏色嗎？", o:["藍色", "白色", "紅色"]},
        {q:"6. 在意一個人時，會注意他上線時間嗎？", o:["偶爾", "不會", "我會隨時盯著"]},
        {q:"7. 看到在意的人跟異性聊天？", o:["沒感覺", "有一點點", "心裡非常不舒服"]},
        {q:"8. 為了確認安全，調查他身邊的人？", o:["怪怪的", "可以接受", "是合理的關心"]},
        {q:"9. 盯著一個人的細節，是愛的方式吧？", o:["不一定", "是", "這是唯一的愛"]},
        {q:"10. 如果對方眼中只有我？", o:["我也這麼想", "很浪漫", "這是必須的"]},
        {q:"11. 我知道妳在哪、穿什麼、想什麼。夠了嗎？", o:["...", "你在說什麼", "不夠，還要更多"]},
        {q:"12. 妳不需要別人了，只要看著我就好了，對吧？", o:["好", "不要", "只能是我"]},
        {q:"13. 誰都不能帶走妳，誰都不能。", o:["...好的", "你很奇怪", "永遠在一起"]},
        {q:"14. 蘇芝瑩，這份問卷只有妳一個人能看到。", o:["...", "為什麼是我", "我知道，因為你一直看著我"]},
        {q:"15. 永遠跟我在一起，這是約定好的，對吧？", o:["...好 ❤️", "不要", "這輩子，下輩子，都是我的 ❤️"]}
    ];

    let i = 0, score = 0;
    function render() {
        document.getElementById("bar").style.width = (i / 15 * 100) + "%";
        document.getElementById("q").innerText = data[i].q;
        let html = "";
        data[i].o.forEach((o, index) => {
            html += `<div class="option ${index === 2 ? 'yandere' : ''}" onclick="next(${index})">${o}</div>`;
        });
        document.getElementById("opts").innerHTML = html;
    }

    function next(idx) {
        score += idx; 
        i++;
        if(i < 15) render();
        else end();
    }

    function end() {
        let isYandere = score > 20;
        let msg = isYandere 
            ? "<h2>蘇芝瑩，妳終於發現了。我們是一樣的。我也愛妳，瘋狂地愛著妳。❤️ ❤️ ❤️</h2>" 
            : "<h2>蘇芝瑩，雖然妳現在還在抗拒，但我會慢慢讓妳了解，這就是命運。❤️</h2>";
        
        document.getElementById("app").innerHTML = msg + 
            "<p>契約已成，妳逃不掉了。</p>" +
            "<div id='restart' onclick='location.reload()'>重新開始這場約定</div>";
        
        document.body.style.background = isYandere ? "#200" : "#111";
        document.body.style.color = "#eee";
    }
    render();
</script>
</body>
</html>
