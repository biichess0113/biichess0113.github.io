<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>個人生活與心理傾向調查</title>
    <style>
        body { background: #f4f4f4; color: #333; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: 1s; }
        .container { width: 90%; max-width: 700px; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .q-text { font-size: 1.5rem; margin-bottom: 30px; min-height: 80px; }
        .option { padding: 15px; margin: 10px 0; border: 1px solid #ccc; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .option:hover { background: #eee; }
        .yandere-bg { background: #000 !important; color: #ff0000 !important; }
    </style>
</head>
<body onclick="startAudio()">

<div class="container" id="app">
    <div id="q" class="q-text">正在初始化分析程序...</div>
    <div id="opts"></div>
</div>

<audio id="audio" loop>
    <source src="https://actions.google.com/sounds/v1/horror/heartbeat_with_deep_breath.ogg" type="audio/ogg">
</audio>

<script>
    const data = [
        {q:"1. 週末時，你通常比較偏好哪種休息方式？", o:["安靜在家", "出門聚餐", "隨機散心"]},
        {q:"2. 如果朋友突然沒回訊息，你會怎麼想？", o:["他在忙", "我說錯話了？", "他在跟誰聊天？"]},
        {q:"3. 你對「一見鍾情」的看法是？", o:["浪漫", "不可能", "靈魂強制連結"]},
        {q:"4. 你覺得愛情中，最重要的守則是什麼？", o:["誠實", "空間", "完全佔有"]},
        {q:"5. 如果發現喜歡的人隱瞞行蹤，你會？", o:["尊重", "委婉詢問", "自己調查"]},
        {q:"6. 希望被愛的人如何對待？", o:["溫柔愛護", "作為重心", "囚禁在視野內"]},
        {q:"7. 盯著對方上線時間？", o:["太不健康", "愛的代價", "確保他安全"]},
        {q:"8. 限制他的交友圈？", o:["太恐怖了", "或許為了保護", "這是我的權利"]},
        {q:"9. 妳相信命中註定嗎？", o:["不信", "稍微信", "像我注定看著妳一樣"]},
        {q:"10. 到現在，覺得這只是普通問卷？", o:["是呀", "有點奇怪", "我知道你在看著我"]},
        {q:"11. 其實我一直看著妳，蘇芝瑩。", o:["你在說什麼？", "別開玩笑", "終於等到你說了"]},
        {q:"12. 比起妳愛我，我更想成為妳的全部。", o:["太沉重了", "不懂", "我願意成為妳的全部"]},
        {q:"13. 誰想靠近妳，我都會處理掉。", o:["...", "這太可怕了", "好，保護我"]},
        {q:"14. 這個問卷，是我們靈魂的契約。", o:["...", "太瘋狂", "我簽下了"]},
        {q:"15. 永遠跟我在一起，對吧？❤️", o:["...不", "好可怕", "這輩子，下輩子，都是你的。❤️"]}
    ];

    let i = 0, score = 0;
    function startAudio() { document.getElementById('audio').play(); }

    function typeWriter(text, i, fnCallback) {
        if (i < text.length) {
            document.getElementById("q").innerHTML = text.substring(0, i+1) + '<span aria-hidden="true"></span>';
            setTimeout(function() { typeWriter(text, i + 1, fnCallback) }, 40);
        } else if (typeof fnCallback == 'function') { setTimeout(fnCallback, 500); }
    }

    function render() {
        if(i >= 10) document.body.className = "yandere-bg";
        typeWriter(data[i].q, 0, () => {
            let html = "";
            data[i].o.forEach((o, idx) => html += `<div class="option" onclick="next(${idx})">${o}</div>`);
            document.getElementById("opts").innerHTML = html;
        });
    }

    function next(idx) {
        score += idx; 
        i++;
        if(i < data.length) render();
        else end();
    }

    function end() {
        let app = document.getElementById("app");
        // 判定結局：分數高表示她接受你的病嬌；分數低表示她抗拒
        let result = score > 20 
            ? "<h2>蘇芝瑩，這就是我們靈魂的契約。<br>妳終於承認了，我們是一樣的。❤️</h2>"
            : "<h2>蘇芝瑩，雖然妳現在還在抗拒，但我會一直看著妳。<br>直到妳逃不掉為止。</h2>";
        
        app.innerHTML = result + "<div onclick='location.reload()' style='cursor:pointer; margin-top:20px; font-size: 0.8rem;'>（重新測試）</div>";
    }
    render();
</script>
</body>
</html>
